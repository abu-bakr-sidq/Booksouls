services:
  - type: web
    name: bookstore-api
    runtime: node
    plan: free
    rootDir: back-end
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGIN
        sync: false

  - type: web
    name: bookstore-frontend
    runtime: static
    plan: free
    rootDir: front-end
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        sync: false
      - key: VITE_BASE_PATH
        value: /
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
